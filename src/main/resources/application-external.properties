# External database profile. Activate with SPRING_PROFILES_ACTIVE=external.
#
# Points the app at an externally hosted Postgres (e.g. a managed/cloud provider)
# instead of the local instance. Supply credentials via env vars (do NOT commit
# real secrets):
#   EXTERNAL_DB_HOST      database host
#   EXTERNAL_DB_PORT      Postgres port (default 5432)
#   EXTERNAL_DB_NAME      database name (default "postgres")
#   EXTERNAL_DB_USER      database user
#   EXTERNAL_DB_PASSWORD  database password
#
# Notes for managed/pooled Postgres providers:
#   - Use a SESSION-mode connection (typically port 5432), not a transaction-mode
#     pooler: Hibernate and Flyway rely on prepared statements / session state
#     that transaction poolers do not support.
#   - Most managed providers require TLS; sslmode=require is set below. Override
#     via EXTERNAL_DB_SSLMODE if your provider needs a different mode.
spring.datasource.url=jdbc:postgresql://${EXTERNAL_DB_HOST}:${EXTERNAL_DB_PORT:5432}/${EXTERNAL_DB_NAME:postgres}?sslmode=${EXTERNAL_DB_SSLMODE:require}&reWriteBatchedInserts=true
spring.datasource.username=${EXTERNAL_DB_USER}
spring.datasource.password=${EXTERNAL_DB_PASSWORD}
