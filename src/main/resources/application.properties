spring.datasource.url=jdbc:postgresql://localhost:5432/pauper-db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=false

# Comma-separated origins allowed to call the API cross-origin (the deployed SPA).
# Set via the APP_CORS_ALLOWED_ORIGINS env var on Cloud Run.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
