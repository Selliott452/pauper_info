# Datasource defaults to the locally hosted Postgres instance.
# Override any of these via env vars, or activate the `external` profile
# (SPRING_PROFILES_ACTIVE=external) to point at an externally hosted Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pauper-db?reWriteBatchedInserts=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Batch inserts/updates so the sync issues multi-row statements instead of one
# round trip per row. Combined with reWriteBatchedInserts=true on the JDBC URL,
# the Postgres driver collapses batched inserts into a single multi-values
# statement — critical when the database is remote (e.g. the external profile).
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=false

# Comma-separated origins allowed to call the API cross-origin (the deployed SPA).
# Set via the APP_CORS_ALLOWED_ORIGINS env var on Cloud Run.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
