name: Deploy backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

# Configure these once in the repo:
#   Settings → Secrets and variables → Actions
#
#   Variables (vars.*):
#     GCP_PROJECT_ID    e.g. pauper-info
#     GCP_REGION        e.g. us-central1
#     AR_REPOSITORY     Artifact Registry repo name, e.g. pauper-info
#     CLOUD_RUN_SERVICE Cloud Run service name, e.g. pauper-info-api
#
#   Secret (secrets.*):
#     GCP_SA_KEY        JSON key for a service account with roles:
#                         Artifact Registry Writer, Cloud Run Admin,
#                         Service Account User
#                       (Workload Identity Federation is the preferred,
#                        keyless alternative - see notes at the bottom.)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # Let jib authenticate to Artifact Registry via the gcloud credential helper.
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image with jib
        run: |
          bash ./gradlew jib \
            -Djib.to.image=$IMAGE:${{ github.sha }} \
            -Djib.to.tags=latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image=$IMAGE:${{ github.sha }} \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --platform=managed
